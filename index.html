<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Les Komputer Ian</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --main-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Background gambar buku yang kamu kirim */
            background: url('https://ianone-oss.github.io/les-komputer/gambar/backbook.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
        }

        /* Container Transparan (Glassmorphism + Neumorphism) */
        .login-container {
            background: rgba(255, 255, 255, 0.25); /* Efek Transparan */
            backdrop-filter: blur(10px); /* Efek Blur di belakang kaca */
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 20px 20px 60px rgba(0, 0, 0, 0.1), 
                        -20px -20px 60px rgba(255, 255, 255, 0.3); /* Bayangan lembut */
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h2 {
            color: #444;
            margin-bottom: 30px;
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Input dengan gaya Neumorphism */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
            outline: none;
            background: rgba(238, 238, 238, 0.5);
            border-radius: 15px;
            box-shadow: inset 5px 5px 10px rgba(0, 0, 0, 0.05), 
                        inset -5px -5px 10px rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus {
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.1), 
                        inset -2px -2px 5px rgba(255, 255, 255, 0.8);
        }

        /* Tombol */
        button {
            width: 100%;
            padding: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 5px 5px 15px rgba(0, 123, 255, 0.3);
            transition: 0.3s;
            margin-top: 10px;
        }

        button:active {
            box-shadow: inset 5px 5px 10px rgba(0, 0, 0, 0.2);
            transform: scale(0.98);
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>LES KOMPUTER</h2>
    <input type="email" id="email" placeholder="Email Guru/Murid">
    <input type="password" id="password" placeholder="Password">
    <button id="btnLogin">MASUK</button>
    <div class="footer">Sistem Informasi Manajemen Belajar</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    // Gunakan Config Firebase kamu yang lama
    const firebaseConfig = {
        apiKey: "AIzaSyDkXnzg_RXtGd8HK7aOhMp0zOJiTf0miGU",
        authDomain: "les-komputer-8531d.firebaseapp.com",
        projectId: "les-komputer-8531d",
        storageBucket: "les-komputer-8531d.firebasestorage.app",
        messagingSenderId: "330141524286",
        appId: "1:330141524286:web:bfd63af42bfd13657f8c6f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const userEmail = userCredential.user.email;
            
            const docRef = doc(db, "users", userEmail);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const role = docSnap.data().role;
                if (role === "admin") {
                    alert("Halo Pak Guru! Membuka Dashboard...");
                    window.location.href = "admin-dashboard.html";
                } else {
                    alert("Halo Murid! Membuka Nilai...");
                    window.location.href = "murid-dashboard.html";
                }
            } else {
                alert("Data role tidak ditemukan.");
            }
        } catch (error) {
            alert("Gagal: " + error.message);
        }
    });
</script>

</body>
</html>
